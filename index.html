<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday, [HER NAME]! 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="starfield"></canvas>

  <div class="container">
    <div class="badge">✨ Today Is All About You</div>
    <h1>Hey <span class="name">[HER NAME]</span>,</h1>
    <p class="subtitle">It's your birthday — will you celebrate it with me? 🎁</p>

    <div class="gif-container">
      <img id="main-gif" src="https://media.tenor.com/kMKoKH7LETwAAAAi/happy-birthday-cute.gif" alt="birthday celebration">
    </div>

    <div class="buttons">
      <button id="yes-btn" onclick="handleYesClick()">Yes! 🥳</button>
      <button id="no-btn" onclick="handleNoClick()">No 😞</button>
    </div>

    <div id="tease-toast"></div>
  </div>

  <audio id="bg-music" loop autoplay muted>
    <!-- swap this with your own song in the music/ folder -->
    <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
  </audio>
  <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔇</button>

  <script src="script.js"></script>
</body>
</html>
